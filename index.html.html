<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Plus 健身房</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand:"#B7D432"
      }
    }
  }
}
</script>

<style>
body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
</style>

</head>

<body class="bg-white text-gray-900">

<!-- HEADER -->
<header class="border-b">
  <div class="max-w-[1200px] mx-auto flex items-center justify-between px-6 py-6">

    <div class="flex items-center gap-4">
      <img src="logo.png" class="h-14 object-contain"/>
      <span class="text-lg font-semibold">Plant Plus</span>
    </div>

    <button onclick="openRules()" class="text-sm border px-5 py-2 rounded-full hover:shadow">
      管理守则
    </button>

  </div>
</header>

<!-- HERO -->
<section class="text-center py-20 px-6">

  <h1 class="text-[40px] md:text-[56px] font-semibold leading-tight">
    内部预约制健身空间
    <span class="text-brand">.</span>
  </h1>

  <p class="mt-6 text-gray-500 text-lg">
    高效 · 自律 · 有序的训练环境
  </p>

</section>

<!-- BOOKING CARD -->
<section class="px-6 pb-20">

  <div class="max-w-[600px] mx-auto bg-white border rounded-2xl p-8 shadow-sm">

    <h3 class="text-xl mb-6 font-medium">预约器械</h3>

    <input id="company" placeholder="公司名称"
      class="w-full border p-3 rounded-lg mb-4"/>

    <input id="name" placeholder="姓名"
      class="w-full border p-3 rounded-lg mb-4"/>

    <div class="mb-4">
      <p class="text-sm mb-2">选择器械（可多选）</p>

      <div class="flex flex-col gap-2 text-sm">
        <label><input type="checkbox" value="龙门架"/> 龙门架</label>
        <label><input type="checkbox" value="跑步机"/> 跑步机</label>
        <label><input type="checkbox" value="瑜伽垫"/> 瑜伽垫</label>
      </div>
    </div>

    <input id="date" type="date"
      class="w-full border p-3 rounded-lg mb-4"/>

    <input id="time" type="time"
      class="w-full border p-3 rounded-lg mb-6"/>

    <button onclick="submitForm()"
      class="w-full bg-brand py-3 rounded-lg font-medium">
      提交预约
    </button>

  </div>

</section>

<!-- RULES MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center px-4">

  <div class="bg-white max-w-2xl w-full p-6 rounded-xl max-h-[80vh] overflow-y-auto">

    <h2 class="text-xl font-semibold mb-4">健身房运营管理守则</h2>

    <div class="text-sm leading-7 text-gray-700">

为营造良好的健身环境，确保器材的高效利用，本健身房执行“全员预约、限时限量”的运营原则。<br><br>

<b>一、开放与准入</b><br>
• 周一至周五 09:00-12:00 & 14:00-17:30（法定节假日关闭）<br>
• 需提前12小时预约，入场须登记<br>
• 场内限额4人<br><br>

<b>二、空间与器材管理</b><br>
• 使用后复位，严禁摔砸<br>
• 使用后擦拭器械<br>
• 离场清理个人物品<br><br>

<b>三、违规处理</b><br>
1. 未预约入场<br>
2. 未签到<br>
3. 器械未复位<br><br>

<b>四、安全声明</b><br>
风险自担，损坏赔偿，财物自理

    </div>

    <button onclick="closeRules()"
      class="mt-6 bg-brand px-6 py-2 rounded-full">
      关闭
    </button>

  </div>

</div>

<script>
function openRules(){
  document.getElementById('modal').classList.remove('hidden');
}
function closeRules(){
  document.getElementById('modal').classList.add('hidden');
}

function submitForm(){
  let company = document.getElementById('company').value;
  let name = document.getElementById('name').value;
  let date = document.getElementById('date').value;
  let time = document.getElementById('time').value;

  let equipments = [];
  document.querySelectorAll('input[type=checkbox]:checked').forEach(el=>{
    equipments.push(el.value);
  });

  if(!company || !name){
    alert("请填写完整信息");
    return;
  }

  let data = {
    company,name,date,time,equipments
  };

  localStorage.setItem("booking_"+Date.now(), JSON.stringify(data));

  alert("预约成功！");
}
</script>

</body>
</html>
