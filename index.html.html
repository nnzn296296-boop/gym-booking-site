<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Green Wellness Gym</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: "#B7D432",
            brandHover: "#A3C62B"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-white text-gray-900">

<!-- HEADER -->
<header class="border-b">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-6">
    <div class="flex items-center gap-2 font-semibold">
      <div class="w-3 h-3 bg-brand rounded-full"></div>
      Green Wellness
    </div>
    <a href="https://cal.com/zheniu-dtlz3h/30min" target="_blank" class="bg-brand px-5 py-2 rounded-full">Book Now</a>
  </div>
</header>

<!-- HERO -->
<section class="max-w-6xl mx-auto grid md:grid-cols-2 gap-10 px-6 py-20">
  <div>
    <h1 class="text-5xl font-semibold leading-tight">
      Train Better.<br/>Live Greener<span class="text-brand">.</span>
    </h1>
    <p class="mt-6 text-gray-500">Build strength through nature-inspired training.</p>
    <a href="https://cal.com/zheniu-dtlz3h/30min" target="_blank" class="inline-block mt-8 bg-brand px-6 py-3 rounded-full">Book a Session</a>
  </div>

  <div class="border rounded-2xl p-8 shadow-sm">
    <h3 class="text-xl mb-6">Book Your Session</h3>
    <div class="space-y-4">
      <select class="w-full border p-3 rounded-lg">
        <option>Select Service</option>
        <option>Strength Training</option>
        <option>Mobility</option>
      </select>
      <input type="date" class="w-full border p-3 rounded-lg"/>
      <input type="time" class="w-full border p-3 rounded-lg"/>
      <a href="https://cal.com/zheniu-dtlz3h/30min" target="_blank" class="block text-center w-full bg-brand py-3 rounded-lg">Book Now</a>
    </div>
  </div>
</section>

<!-- SERVICES -->
<section class="max-w-6xl mx-auto px-6 py-16">
  <h2 class="text-3xl mb-10">Services</h2>
  <div class="grid md:grid-cols-4 gap-6">
    <div class="border p-6 rounded-xl">Strength</div>
    <div class="border p-6 rounded-xl">Mobility</div>
    <div class="border p-6 rounded-xl">Coaching</div>
    <div class="border p-6 rounded-xl">Recovery</div>
  </div>
</section>

<!-- CTA -->
<section class="bg-brand py-16 text-center">
  <h2 class="text-2xl mb-6">Start Your First Session Today</h2>
  <a href="https://calendly.com" target="_blank" class="bg-white px-6 py-3 rounded-full">Book Appointment</a>
</section>

</body>
</html>
